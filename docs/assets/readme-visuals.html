<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WorkflowX README Visuals</title>
  <style>
    :root {
      --bg: #000000;
      --ink: #f8f8f6;
      --soft: #d6d0c8;
      --muted: #88837c;
      --faint: #4d4943;
      --line: rgba(255, 255, 255, 0.13);
      --line-soft: rgba(255, 255, 255, 0.07);
      --panel: #050505;
      --panel-2: #090909;
      --panel-3: #0d0d0d;
      --accent: #ff6428;
      --accent-soft: rgba(255, 100, 40, 0.13);
      --ok: #d7e6dc;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 1200px;
      height: 675px;
      margin: 0;
      overflow: hidden;
      background: #000000;
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
        "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    #stage {
      position: relative;
      width: 1200px;
      height: 675px;
      overflow: hidden;
      background: #000000;
    }

    .frame {
      position: absolute;
      inset: 0;
      padding: 34px 48px 28px;
      background: #000000;
    }

    .grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.55;
      background-image:
        linear-gradient(var(--line-soft) 1px, transparent 1px),
        linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: linear-gradient(180deg, transparent 0%, #000 14%, #000 78%, transparent 100%);
    }

    .topbar {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 32px;
      min-height: 96px;
    }

    .brand-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      font-size: 18px;
      font-weight: 780;
      color: var(--ink);
    }

    .brand-line img {
      width: 30px;
      height: auto;
      display: block;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 840;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 690px;
      font-size: 34px;
      line-height: 1.04;
      font-weight: 860;
      color: var(--ink);
    }

    .sub {
      max-width: 620px;
      margin-top: 13px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.48;
      font-weight: 520;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: 360px;
      padding-top: 4px;
    }

    .chip {
      height: 30px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0 10px;
      color: var(--soft);
      background: rgba(255, 255, 255, 0.025);
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
    }

    .chip.hot {
      color: var(--ink);
      border-color: rgba(255, 100, 40, 0.55);
      background: var(--accent-soft);
    }

    .product {
      position: relative;
      z-index: 1;
      height: 438px;
      margin-top: 4px;
      border: 1px solid var(--line);
      background: #000000;
      overflow: hidden;
    }

    .product::before {
      content: "";
      position: absolute;
      inset: 0;
      border: 1px solid rgba(255, 255, 255, 0.035);
      pointer-events: none;
    }

    .panel {
      border: 1px solid var(--line);
      background: var(--panel);
    }

    .micro {
      color: var(--muted);
      font-size: 10px;
      font-weight: 820;
      text-transform: uppercase;
    }

    .accent-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 18px rgba(255, 100, 40, 0.55);
    }

    .architecture {
      display: grid;
      grid-template-columns: 250px 1fr 250px;
      gap: 18px;
      padding: 20px;
    }

    .side-stack {
      display: grid;
      gap: 12px;
    }

    .node {
      min-height: 94px;
      padding: 14px 16px;
    }

    .node .label,
    .main-core .label,
    .cap-card .label,
    .mode .label,
    .token-card .label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .node strong,
    .cap-card strong,
    .mode strong,
    .token-card strong {
      display: block;
      margin: 12px 0 7px;
      color: var(--ink);
      font-size: 20px;
      line-height: 1.05;
      font-weight: 850;
    }

    .node p,
    .cap-card p,
    .mode p,
    .token-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.38;
    }

    .main-core {
      position: relative;
      min-height: 396px;
      padding: 22px 28px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.035), transparent 42%),
        #020202;
    }

    .main-core h2 {
      margin: 14px 0 9px;
      font-size: 34px;
      line-height: 1;
    }

    .main-core p {
      margin: 0;
      max-width: 520px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.42;
    }

    .core-orbit {
      position: relative;
      height: 150px;
      margin: 12px 0;
      border: 1px solid var(--line-soft);
      background: #000;
      display: grid;
      grid-template-columns: 1fr 128px 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 10px 14px;
      padding: 16px 38px;
      align-items: stretch;
    }

    .orbit-ring {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 72%;
      height: 1px;
      border: 0;
      background: rgba(255, 255, 255, 0.16);
      transform: translate(-50%, -50%) rotate(-8deg);
      border-radius: 0;
      z-index: 0;
    }

    .orbit-core {
      position: relative;
      grid-column: 2;
      grid-row: 1 / span 2;
      width: 116px;
      height: 116px;
      align-self: center;
      justify-self: center;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 100, 40, 0.52);
      background: #030303;
      font-size: 18px;
      font-weight: 860;
      z-index: 2;
    }

    .orbit-item {
      position: relative;
      min-width: 0;
      padding: 9px 10px;
      border: 1px solid var(--line);
      background: #040404;
      color: var(--soft);
      font-size: 10px;
      line-height: 1.18;
      z-index: 2;
    }

    .orbit-item b {
      display: block;
      margin-bottom: 3px;
      color: var(--ink);
      font-size: 12px;
    }

    .orbit-item.a { grid-column: 1; grid-row: 1; }
    .orbit-item.b { grid-column: 3; grid-row: 1; }
    .orbit-item.c { grid-column: 1; grid-row: 2; }
    .orbit-item.d { grid-column: 3; grid-row: 2; }

    .data-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .data-strip div {
      min-height: 62px;
      padding: 11px 14px;
      border: 1px solid var(--line);
      background: #030303;
    }

    .data-strip b {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 14px;
    }

    .data-strip span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }

    .token {
      display: grid;
      grid-template-columns: 370px 1fr;
      gap: 18px;
      padding: 20px;
    }

    .token-hero {
      position: relative;
      padding: 32px;
      min-height: 396px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      background: #020202;
    }

    .token-hero .big {
      color: var(--ink);
      font-size: 66px;
      line-height: 0.88;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .token-hero .big span {
      color: var(--accent);
    }

    .token-hero p {
      margin: 18px 0 0;
      max-width: 270px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .token-graph {
      position: relative;
      height: 132px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line-soft);
      overflow: hidden;
    }

    .token-graph i {
      position: absolute;
      left: var(--x);
      bottom: var(--y);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.28);
    }

    .token-graph .hot {
      background: var(--accent);
    }

    .token-stack {
      display: grid;
      gap: 10px;
    }

    .token-card {
      position: relative;
      display: grid;
      grid-template-columns: 86px 1fr 150px;
      gap: 18px;
      align-items: center;
      padding: 22px;
      min-height: 118px;
      background: #030303;
    }

    .token-card .code {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      color: var(--soft);
      font-size: 22px;
      font-weight: 900;
      background: #000;
    }

    .token-card:first-child .code {
      border-color: rgba(255, 100, 40, 0.55);
      color: var(--accent);
    }

    .token-card .stat {
      border-left: 1px solid var(--line);
      padding-left: 18px;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.05;
      font-weight: 880;
    }

    .token-card .stat small {
      display: block;
      margin-top: 7px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
    }

    .capabilities {
      display: grid;
      grid-template-columns: 460px 1fr;
      gap: 18px;
      padding: 20px;
    }

    .mode-stack {
      padding: 18px;
      background: #020202;
    }

    .mode-stack-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .mode {
      display: grid;
      grid-template-columns: 112px 1fr 58px;
      gap: 14px;
      align-items: center;
      min-height: 84px;
      border-top: 1px solid var(--line-soft);
    }

    .mode:first-of-type {
      border-top: 0;
    }

    .mode .cmd {
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      background: #000;
      color: var(--soft);
      font-size: 13px;
      font-weight: 850;
    }

    .mode.primary .cmd,
    .mode.primary .mark {
      border-color: rgba(255, 100, 40, 0.62);
      color: var(--accent);
    }

    .mode strong {
      margin: 0 0 5px;
      font-size: 18px;
    }

    .mode .mark {
      justify-self: end;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
    }

    .cap-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .cap-card {
      min-height: 124px;
      padding: 18px;
      background: #030303;
    }

    .cap-card strong {
      margin-top: 18px;
      font-size: 18px;
    }

    .cap-card.feature {
      border-color: rgba(255, 100, 40, 0.54);
    }

    .workflow {
      position: relative;
      height: 420px;
      margin-top: 4px;
      border: 1px solid var(--line);
      background: #000000;
      overflow: hidden;
    }

    .workflow-shell {
      position: absolute;
      left: 34px;
      right: 34px;
      top: 20px;
      bottom: 20px;
      display: grid;
      grid-template-columns: 214px 1fr 194px;
      gap: 16px;
    }

    .phase-list,
    .ledger {
      padding: 16px;
      background: #020202;
      border: 1px solid var(--line);
    }

    .phase-title,
    .ledger-title {
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .phase-row {
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 8px;
      align-items: start;
      min-height: 28px;
      color: var(--muted);
      opacity: 0.52;
    }

    .phase-row.done { opacity: 0.86; }
    .phase-row.active { opacity: 1; }

    .phase-num {
      height: 20px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      font-size: 9px;
      font-weight: 850;
      color: var(--muted);
      background: #000;
    }

    .phase-row.active .phase-num {
      color: #000;
      background: var(--accent);
      border-color: var(--accent);
    }

    .phase-row b {
      display: block;
      color: var(--ink);
      font-size: 10px;
      line-height: 1.12;
      margin-bottom: 2px;
    }

    .phase-row span {
      display: block;
      color: var(--muted);
      font-size: 9px;
      line-height: 1.2;
    }

    .motion {
      position: relative;
      background: #010101;
      border: 1px solid var(--line);
      overflow: hidden;
    }

    .motion-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 18px 20px 0;
    }

    .motion-head .k {
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .motion-head h2 {
      margin: 8px 0 0;
      font-size: 27px;
      line-height: 1.05;
    }

    .state-pill {
      min-width: 76px;
      height: 32px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 100, 40, 0.54);
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      background: rgba(255, 100, 40, 0.08);
    }

    .scene-area {
      position: absolute;
      left: 20px;
      right: 20px;
      top: 96px;
      bottom: 24px;
      border: 1px solid var(--line-soft);
      background: #000;
      overflow: hidden;
      transform: translate3d(var(--scene-x), var(--scene-y), 0) scale(var(--scene-scale));
      opacity: var(--scene-opacity);
    }

    .scene-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 18px;
    }

    .work-card {
      min-height: 88px;
      border: 1px solid var(--line);
      background: #040404;
      padding: 14px;
    }

    .work-card b {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 15px;
    }

    .work-card span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.34;
    }

    .command-line {
      margin: 18px;
      padding: 15px 16px;
      border: 1px solid var(--line);
      color: var(--soft);
      background: #020202;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 13px;
    }

    .command-line::before {
      content: ">";
      color: var(--accent);
      margin-right: 10px;
    }

    .signal {
      display: grid;
      grid-template-columns: 1fr 88px 1fr;
      gap: 16px;
      align-items: center;
      height: 100%;
      padding: 22px;
    }

    .signal-stack {
      display: grid;
      gap: 8px;
    }

    .noise-row,
    .clean-row {
      height: 30px;
      border: 1px solid var(--line-soft);
      background: #030303;
      transform: translateX(var(--dx, 0));
      opacity: var(--o, 1);
    }

    .noise-row i,
    .clean-row i {
      display: block;
      height: 100%;
      width: var(--w);
      background: rgba(255, 255, 255, 0.14);
    }

    .clean-row i {
      background: rgba(255, 255, 255, 0.32);
    }

    .filter {
      height: 88px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 100, 40, 0.5);
      color: var(--accent);
      font-size: 13px;
      font-weight: 900;
      background: #030303;
      transform: rotate(var(--filter-angle));
    }

    .tree {
      height: 100%;
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .tree-doc {
      border: 1px solid var(--line);
      background: #030303;
      padding: 18px;
    }

    .tree-doc h3 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .bar {
      display: block;
      width: var(--w);
      height: 7px;
      margin: 9px 0;
      background: rgba(255, 255, 255, 0.18);
    }

    .bar.hot {
      background: var(--accent);
      width: calc(var(--w) * var(--grow));
    }

    .loop {
      position: relative;
      height: 100%;
      padding: 26px 18px;
    }

    .loop-card {
      position: absolute;
      width: 174px;
      min-height: 92px;
      border: 1px solid var(--line);
      background: #040404;
      padding: 14px;
    }

    .loop-card.active {
      border-color: rgba(255, 100, 40, 0.68);
    }

    .loop-card b {
      display: block;
      margin-bottom: 7px;
      font-size: 16px;
    }

    .loop-card span {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.3;
    }

    .loop-card.eval { left: 20px; top: 62px; }
    .loop-card.main { left: 224px; top: 36px; }
    .loop-card.code { right: 20px; top: 62px; }

    .loop-line {
      position: absolute;
      height: 1px;
      background: rgba(255, 255, 255, 0.22);
      transform-origin: left center;
    }

    .loop-packet {
      position: absolute;
      left: var(--packet-x);
      top: var(--packet-y);
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 20px rgba(255, 100, 40, 0.62);
      transform: translate(-50%, -50%);
    }

    .pass-panel {
      height: 100%;
      display: grid;
      place-items: center;
      text-align: center;
    }

    .pass-mark {
      width: 156px;
      height: 156px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 100, 40, 0.64);
      color: var(--accent);
      font-size: 30px;
      font-weight: 920;
      background: #020202;
    }

    .ledger-card {
      min-height: 84px;
      margin-bottom: 10px;
      padding: 13px;
      border: 1px solid var(--line-soft);
      background: #030303;
    }

    .ledger-card .label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .ledger-card .value {
      margin-top: 9px;
      color: var(--ink);
      font-size: 22px;
      font-weight: 900;
      line-height: 1;
    }

    .ledger-card .value.hot {
      color: var(--accent);
    }

    .tree-ledger {
      display: grid;
      gap: 8px;
    }

    .tree-row {
      min-height: 45px;
      padding: 9px 10px;
      border: 1px solid var(--line-soft);
      background: #030303;
    }

    .tree-row b {
      display: block;
      color: var(--ink);
      font-size: 12px;
      line-height: 1.1;
      margin-bottom: 5px;
    }

    .tree-row span {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.2;
    }

    .tree-row em {
      color: var(--muted);
      font-style: normal;
      font-weight: 900;
      white-space: nowrap;
    }

    .tree-row.pass {
      border-color: rgba(255, 255, 255, 0.20);
    }

    .tree-row.pass em {
      color: var(--ok);
    }

    .tree-row.fix {
      border-color: rgba(255, 100, 40, 0.52);
      background: rgba(255, 100, 40, 0.055);
    }

    .tree-row.fix em,
    .tree-row.active em {
      color: var(--accent);
    }

    .route-map {
      position: relative;
      height: 100%;
      padding: 14px;
    }

    .route-topology {
      position: relative;
      height: calc(100% - 54px);
      margin-top: 10px;
      display: grid;
      grid-template-columns: 134px 118px 1fr;
      gap: 16px;
      align-items: center;
    }

    .route-source,
    .route-gate,
    .route-branch {
      border: 1px solid var(--line);
      background: #030303;
      padding: 13px;
    }

    .route-source b,
    .route-gate b,
    .route-branch b {
      display: block;
      color: var(--ink);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .route-source span,
    .route-gate span,
    .route-branch span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.28;
    }

    .route-gate {
      min-height: 116px;
      display: grid;
      align-content: center;
      border-color: rgba(255, 100, 40, 0.44);
      background: rgba(255, 100, 40, 0.035);
    }

    .route-lanes {
      display: grid;
      gap: 5px;
    }

    .route-branch {
      min-height: 34px;
      padding: 7px 10px;
      transform: translateX(calc((1 - var(--pop)) * 14px));

    .question-card span,
    .payload-card span,
    .diff-card span {

    }

    .route-decision {

      padding: 14px;
      border: 1px solid rgba(255, 100, 40, 0.55);
      background: rgba(255, 100, 40, 0.065);

      font-size: 12px;
      font-weight: 900;
    }

    .resource-load {
      height: 100%;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

      background: #030303;
      padding: 14px;
    }

      background: rgba(255, 255, 255, 0.08);

    }

      gap: 10px;

    }

    .file-node {

    .scan-note {

      font-size: 10px;
      line-height: 1.25;

    .confirm-item b {
      display: block;

      margin-bottom: 4px;

    .confirm-button {
      border: 1px solid rgba(255, 100, 40, 0.58);

      place-items: center;
      text-align: center;
      color: var(--accent);
      font-weight: 920;
      transform: scale(calc(0.98 + var(--click) * 0.02));

    .confirm-button span {
      display: block;

      color: var(--soft);

      line-height: 1.25;

      padding: 10px;

    .tree-doclet {
      border: 1px solid var(--line-soft);

      opacity: calc(0.16 + var(--tree-pop) * 0.84);

      display: block;
      color: var(--ink);
      font-size: 17px;
      margin-bottom: 10px;
    }

      transform: scale(var(--scale)) translateY(var(--dy));

      width: 100%;

      border: 1px solid var(--line);

      font-size: 9px;
      line-height: 1.2;

      font-size: 12px;
      text-align: center;
      line-height: 1.2;

      background: rgba(255, 100, 40, 0.55);

      transform-origin: left;

    .razor {

      line-height: 1.35;

      gap: 12px;

      font-weight: 900;
      font-style: normal;

    .iter-arrow {

    .iter-status {

      font-size: 10px;

    .iter-status i.hot {
      color: var(--accent);
      border-color: rgba(255, 100, 40, 0.42);

    .iter-status i.pass {

    .eval-col {

    const C = i18n[lang] || i18n.zh;

    function sceneLabel() {
      if (scene === "architecture") return C.labelArch;
      if (scene === "token") return C.labelToken;
      if (scene === "capabilities") return C.labelCap;
      return C.labelFlow;
    }

    function header(title, sub) {
      return `
        <div class="topbar">
          <div>

    function layout(body, title, sub) {
      root.innerHTML = `

          <div class="grid"></div>

    }

    function architecture() {
      const n = C.nodes;
      layout(`
        <div class="product architecture">
          <div class="side-stack">
            ${node(n.command, true)}
            ${node(n.status)}

            </div>

          </div>

          </div>

      );
    }

    function node(item, hot = false) {
      return `<div class="node panel">
        <div class="label">${hot ? '<span class="accent-dot"></span>' : ""}${item[0]}</div>

    }

    function token() {
      const dots = Array.from({ length: 28 }, (_, i) => {
        const x = 5 + i * 3.35;
        const y = 22 + Math.sin(i * 0.58) * 22 + i * 0.85;
        return `<i class="${i > 19 ? "hot" : ""}" style="--x:${x.toFixed(1)}%;--y:${Math.max(8, Math.min(84, y)).toFixed(1)}%"></i>`;
      }).join("");
      layout(`

          <div class="token-hero panel">
            <div>
              <div class="micro">${lang === "zh" ? "Context Budget Engine" : "Context Budget Engine"}</div>
              <div class="big">${C.token.big.replace("-", "<span>-</span>")}</div>

        C.capTitle,

    function workflow(t) {
      const clamp = (v) => Math.max(0, Math.min(1, v));
      const expo = (v) => v >= 1 ? 1 : 1 - Math.pow(2, -8 * v);
      const weights = [1.0, 1.0, 1.15, 1.35, 0.85, 1.15, 1.45, 1.1, 1.25, 1.45, 2.05, 1.45];
      const total = weights.reduce((sum, v) => sum + v, 0);
      const raw = clamp(t || 0) * total;
      let cursor = raw;
      let idx = 0;
      while (idx < weights.length - 1 && cursor >= weights[idx]) cursor -= weights[idx++];
      const local = clamp(cursor / weights[idx]);
      const enter = expo(clamp(local * 1.6));
      const card = C.steps[idx];
      const status = idx < 4 ? "DISCOVER" : idx < 8 ? "SPEC" : idx < 9 ? "BUILD" : idx < 11 ? "VERIFY" : "CLOSED";
      const view = activeView(idx, local, enter, expo, clamp);
      const style = [
        `--scene-x:${((1 - enter) * 14).toFixed(1)}px`,
        `--scene-y:${((1 - enter) * 7).toFixed(1)}px`,
        `--scene-scale:${(0.986 + enter * 0.014).toFixed(3)}`,
        `--scene-opacity:${(0.48 + enter * 0.52).toFixed(3)}`
      ].join(";");

      root.innerHTML = `
        <section class="frame">
          <div class="grid"></div>
          ${header(C.workflowTitle, C.workflowSub)}
          <div class="workflow" style="${style}">
            <div class="workflow-shell">
              <aside class="phase-list">
                <div class="phase-title">${lang === "zh" ? "阶段索引" : "Phase Index"}</div>
                ${C.steps.map((step, i) => `
                  <div class="phase-row ${i < idx ? "done" : i === idx ? "active" : ""}">
                    <div class="phase-num">${String(i + 1).padStart(2, "0")}</div>
                    <div><b>${step[0]}</b><span>${step[1]}</span></div>
                  </div>`).join("")}
              </aside>
              <main class="motion">
                <div class="motion-head">
                  <div><div class="k">${lang === "zh" ? "当前演示" : "Current Demo"} / ${String(idx + 1).padStart(2, "0")}</div><h2>${card[0]}</h2></div>
                  <div class="state-pill">${status}</div>
                </div>
                <div class="scene-area">${view}</div>
              </main>
              <aside class="ledger">
                <div class="ledger-title">Hybrid Tree Ledger</div>
                ${ledgerView(idx, local)}
              </aside>
            </div>
          </div>
          <div class="watermark">Created by Huashu-Design</div>
        </section>`;
      window.__ready = true;
    }

    function ledgerView(idx, local) {
      const statusFor = (name, start, passAt, failAt = -1) => {
        let cls = "";
        let status = "WAIT";
        if (idx >= start) { cls = "active"; status = "TRACK"; }
        if (idx >= failAt && failAt >= 0 && idx < passAt) { cls = "fix"; status = "FIX"; }
        if (idx >= passAt) { cls = "pass"; status = "PASS"; }
        return [cls, status];
      };
      const rows = [
        ["Scope", lang === "zh" ? "范围与非功能要求" : "Scope and NFRs", ...statusFor("scope", 4, 5)],
        ["AC-01", lang === "zh" ? "路由与状态恢复" : "Routing and state recovery", ...statusFor("ac1", 5, 9)],
        ["AC-02", lang === "zh" ? "实现符合 Child 需求" : "Implementation matches Child", ...statusFor("ac2", 5, 10, 8)],
        ["AC-03", lang === "zh" ? "质量验收与回流" : "Verification and fix loop", ...statusFor("ac3", 5, 10, 8)],
        ["Memory", lang === "zh" ? "稳定事实回写" : "Stable facts persisted", ...statusFor("mem", 10, 11)]
      ];
      return `<div class="tree-ledger">${rows.map(([name, body, cls, status]) => `
        <div class="tree-row ${cls}">
          <b>${name}</b>
          <span>${body}<em>${status}</em></span>
        </div>`).join("")}</div>`;
    }

    function activeView(idx, local, enter, expo, clamp) {
      const bars = [88, 62, 74, 48].map((w, i) => `<i class="bar ${i === 0 ? "hot" : ""}" style="--w:${w}%;--grow:${enter.toFixed(2)}"></i>`).join("");
      if (idx === 0) {
        const routeProgress = expo(clamp(local * 1.28)).toFixed(3);
        const pop = (n) => expo(clamp(local * 2.4 - n * 0.16)).toFixed(3);
        return `<div class="route-map">
          <div class="route-command">xwhole ${lang === "zh" ? "实现订单中心，支持并行验收" : "build order center with parallel verification"}</div>
          <div class="route-topology" style="--route-progress:${routeProgress}">
            <div class="route-wire"></div><div class="route-token"></div>
            <div class="route-source"><b>${lang === "zh" ? "入口命令" : "Entry"}</b><span>xwhole / new workflow intent</span></div>
            <div class="route-gate"><b>RouteX</b><span>${lang === "zh" ? "读取 status、命令前缀与工作区状态" : "Reads status, command prefix, and workspace state"}</span></div>
            <div class="route-lanes">
              <div class="route-branch" style="--pop:${pop(0)}"><b>Route 0</b><span>${lang === "zh" ? "已有工作流：接入" : "Active workflow: attach"}</span></div>
              <div class="route-branch" style="--pop:${pop(1)}"><b>Route 1</b><span>${lang === "zh" ? "只读探索：不编码" : "Read-only exploration"}</span></div>
              <div class="route-branch active" style="--pop:${pop(2)}"><b>Route 3 / xwhole</b><span>${lang === "zh" ? "完整流程：发现、文档、实现、验收" : "Full flow: discover, document, build, verify"}</span></div>
              <div class="route-branch" style="--pop:${pop(3)}"><b>Route 2</b><span>${lang === "zh" ? "空闲编码意图：推荐模式" : "Idle coding intent"}</span></div>
            </div>
          </div>
        </div>`;
      }
      if (idx === 1) {
        const fill = (offset) => expo(clamp(local * 1.5 - offset)).toFixed(3);
        const items = [
          ["MCP Memory", lang === "zh" ? "连接知识图谱与跨会话事实" : "Connect graph memory and cross-session facts"],
          ["Worktree", lang === "zh" ? "准备隔离执行目录" : "Prepare isolated execution dir"],
          ["Flags", "-N 3 / -box demo / fallback"],
          ["Tooling", lang === "zh" ? "探测可用工具与降级路径" : "Probe tools and degradation path"]
        ];
        return `<div class="resource-load">${items.map((item, i) => `
          <div class="resource-card"><b>${item[0]}</b><span>${item[1]}</span><div class="load-bar"><i style="--fill:${fill(i * 0.16)}"></i></div></div>`).join("")}</div>`;
      }
      if (idx === 2) {
        const scan = expo(clamp(local * 1.35)).toFixed(3);
        const files = ["src/routes/order.ts", "src/services/auth.ts", "src/payments/callback.ts", "tests/order.spec.ts", ".hybrid/status.json"];
        const lines = [92, 72, 64, 88, 56, 76, 68].map((w, i) => `<i class="code-line ${i === 2 || i === 5 ? "hot" : ""}" style="--w:${w}%;--scan:${scan}"></i>`).join("");
        return `<div class="code-scan">
          <div class="file-tree">${files.map((file, i) => `<div class="file-node ${i < local * files.length ? "active" : ""}">${file}</div>`).join("")}</div>
          <div class="code-pane">${lines}<div class="scan-note">${lang === "zh" ? "工程缩影先建立文件索引：路由、auth、支付回调、测试入口。" : "Project snapshot builds the file index: routes, auth, callbacks, and tests."}</div></div>
        </div>`;
      }
      if (idx === 3) {
        const reveal = (n) => expo(clamp(local * 1.9 - n * 0.18)).toFixed(3);
        const hit = (n) => expo(clamp(local * 1.7 - n * 0.16)).toFixed(3);
        const turns = lang === "zh"
          ? [["Main Agent / 问", "订单状态是否允许人工回滚？"], ["User / 答", "允许，但必须记录操作者和原因。"], ["Main Agent / 质疑", "你要求并行验收，但支付回调写共享状态，这里必须加锁或幂等。"]]
          : [["Main Agent / Q", "Can order state be manually rolled back?"], ["User / A", "Yes, but operator and reason must be recorded."], ["Main Agent / Challenge", "You requested parallel verification, but payment callbacks write shared state; idempotency or locking is required."]];
        const results = [
          ["src/routes/order.ts", "route"],
          ["src/services/auth.ts", "auth"],
          ["src/payments/callback.ts", "risk"],
          ["tests/order.spec.ts", "test"],
          [".hybrid/status.json", "state"]
        ];
        return `<div class="discovery-search">
          <div class="dialogue-stream">${turns.map((turn, i) => `<div class="turn ${i === 1 ? "answer" : ""} ${i === 2 ? "challenge" : ""}" style="--reveal:${reveal(i)}"><b>${turn[0]}</b><span>${turn[1]}</span></div>`).join("")}</div>
          <div class="live-search">
            <div class="search-query">rg -n "rollback|payment|auth|parallel" src tests .hybrid</div>
            <div class="search-results">${results.map((r, i) => `<div class="result-row ${i === 2 ? "hot" : ""}" style="--hit:${hit(i)}"><span>${r[0]}</span><em>${r[1]}</em></div>`).join("")}</div>
            <div class="index-note" style="--index-ready:${reveal(2)}">${lang === "zh" ? "搜索结果收束成 AC：回滚、权限、幂等与恢复路径。" : "Search results become ACs: rollback, permission, idempotency, and recovery."}</div>
          </div>
        </div>`;
      }
      if (idx === 4) {
        const click = expo(clamp(local * 1.4 - 0.18)).toFixed(3);
        const items = lang === "zh"
          ? [["范围", "订单中心覆盖创建、支付回调与状态流转。"], ["风险", "并行验收必须处理共享状态与幂等。"], ["AC", "回滚、权限、恢复路径、测试入口已明确。"]]
          : [["Scope", "Order center covers creation, callbacks, and state flow."], ["Risk", "Parallel verification must handle shared state and idempotency."], ["AC", "Rollback, permission, recovery path, and test entry are explicit."]];
        return `<div class="confirm-action" style="--click:${click}">
          <div class="confirm-summary"><h3>${lang === "zh" ? "先确认，再写树" : "Confirm before tree"}</h3>${items.map((item) => `<div class="confirm-item"><b>${item[0]}</b>${item[1]}</div>`).join("")}</div>
          <div class="confirm-button">${lang === "zh" ? "点击确认" : "Confirm"}<span>${lang === "zh" ? "Hard Gate 通过后才允许生成 Hybrid Tree" : "Hybrid Tree is generated only after the Hard Gate passes"}</span></div>
        </div>`;
      }
      if (idx === 5) {
        const treePop = expo(clamp(local * 1.55)).toFixed(3);
        const gateText = lang === "zh" ? "确认完成，开始生成 Parent / Child / AC 文档树。" : "Confirmed; generate the Parent / Child / AC document tree.";
        return `<div class="confirm-tree">
          <div class="confirm-card"><div><b>${lang === "zh" ? "已确认" : "Confirmed"}</b><span>${gateText}</span></div></div>
          <div class="doc-tree-build" style="--tree-pop:${treePop}">
            <div class="tree-root"><b>Parent.md</b><span>${lang === "zh" ? "范围 / NFR / DoD / 路由表" : "Scope / NFR / DoD / routes"}</span></div>
            <div class="tree-branches">
              <div class="tree-child"><b>Child-01.md</b><span>${lang === "zh" ? "订单状态与恢复" : "Order state and recovery"}</span><div class="tree-ac-list"><div class="tree-ac"><b>AC-01</b><span>${lang === "zh" ? "路由恢复可验收" : "Route recovery is verifiable"}</span></div><div class="tree-ac"><b>AC-02</b><span>${lang === "zh" ? "回滚记录操作者" : "Rollback records operator"}</span></div></div></div>
              <div class="tree-child"><b>Child-02.md</b><span>${lang === "zh" ? "支付回调与并行风险" : "Payment callback and parallel risk"}</span><div class="tree-ac-list"><div class="tree-ac"><b>AC-03</b><span>${lang === "zh" ? "幂等和测试覆盖" : "Idempotency and test coverage"}</span></div><div class="tree-ac"><b>Memory</b><span>${lang === "zh" ? "稳定事实回写" : "Stable facts persisted"}</span></div></div></div>
            </div>
          </div>
        </div>`;
      }
      if (idx === 6) {
        const clean = expo(clamp(local * 1.35));
        const noise = lang === "zh"
          ? [["旧讨论", false, 34], ["回滚必须审计", true, 58], ["重复日志", false, 42], ["闲聊", false, 28], ["支付回调共享状态", true, 64], ["过期假设", false, 38], ["权限边界", true, 46], ["无关栈报错", false, 52], ["测试入口", true, 36], ["历史偏好", false, 44]]
          : [["old thread", false, 34], ["rollback must audit", true, 58], ["duplicate logs", false, 42], ["small talk", false, 28], ["callback shared state", true, 64], ["stale assumption", false, 38], ["permission boundary", true, 46], ["unrelated stack", false, 52], ["test entry", true, 36], ["old preference", false, 44]];
        const chips = noise.map(([label, keep, w], i) => {
          const drop = keep ? 0.38 + clean * 0.58 : 0.82 - clean * 0.74;
          const scale = keep ? 1 : 1 - clean * 0.38;
          return `<i class="noise-chip ${keep ? "keep" : "drop"}" style="--w:${w}%;--drop:${drop.toFixed(2)};--scale:${scale.toFixed(2)};--dy:${(clean * (keep ? -3 : 18)).toFixed(1)}px">${label}</i>`;
        }).join("");
        const facts = lang === "zh"
          ? [["Scope", "订单中心只覆盖创建、支付回调与状态流转"], ["AC", "权限、回滚、重试与状态恢复必须可验收"], ["Memory", "稳定事实写回 Hybrid Tree 与 MCP 摘要"]]
          : [["Scope", "Order center covers creation, callback, and state flow"], ["AC", "Permission, rollback, retry, and recovery are verifiable"], ["Memory", "Stable facts go to Hybrid Tree and MCP summary"]];
        return `<div class="denoise-lab" style="--pulse:${(0.5 + Math.sin(local * Math.PI * 4) * 0.5).toFixed(3)}">
          <div class="context-cloud">${chips}</div>
          <div class="signal-funnel">noiseX<br>${lang === "zh" ? "去噪" : "denoise"}</div>
          <div class="distilled-stack">${facts.map((f, i) => `<div class="distilled-fact" style="--reveal:${Math.max(0.12, clean - i * 0.18).toFixed(2)}"><b>${f[0]}</b><span>${f[1]}</span></div>`).join("")}</div>
        </div>`;
      }
      if (idx === 7) {
        const dims = ["Intent", "Files", "AC", "Risk", "Tests", "Limits", "Context", "Fix-ready"];
        return `<div class="prompt-dispatch">
          <div class="payload-card"><b>promptX</b><span>${lang === "zh" ? "把粗需求转成 coderX 可执行输入。" : "Turns rough intent into coderX-ready input."}</span><div class="dim-list">${dims.map((d, i) => `<i class="${i < local * dims.length ? "hot" : ""}">${d}</i>`).join("")}</div></div>
          <div class="payload-card"><b>Bus Payload</b><span>${lang === "zh" ? "只携带 Child AC、文件索引、约束和验证重点。" : "Carries only Child AC, file index, constraints, and audit focus."}</span>${bars}</div>
        </div>`;
      }
      if (idx === 8) {
        return iterationLoop(local * 0.52, expo, clamp);
      }
      if (idx === 9) {
        return iterationLoop(0.52 + local * 0.48, expo, clamp);
      }
      if (idx === 10) {
        const treePop = expo(clamp(local * 1.35)).toFixed(3);
        return `<div class="confirm-tree">
          <div class="confirm-card"><div><b>${lang === "zh" ? "回写" : "Writeback"}</b><span>${lang === "zh" ? "主智能体把复验结果写回 Hybrid Tree，而不是只显示 PASS。" : "The Main Agent writes verification results back to Hybrid Tree, not just a PASS label."}</span></div></div>
          <div class="doc-tree-build" style="--tree-pop:${treePop}">
            <div class="tree-root"><b>Parent.md</b><span>${lang === "zh" ? "DoD / 需求状态 / 迭代记录" : "DoD / requirement state / iteration log"}</span></div>
            <div class="tree-branches">
              <div class="tree-child"><b>Child-01.md</b><span>${lang === "zh" ? "订单状态与恢复" : "Order state and recovery"}</span><div class="tree-ac-list"><div class="tree-ac pass"><b>AC-01 PASS</b><span>${lang === "zh" ? "路由恢复已验收" : "Route recovery verified"}</span></div><div class="tree-ac pass"><b>AC-02 PASS</b><span>${lang === "zh" ? "回滚审计已覆盖" : "Rollback audit covered"}</span></div></div></div>
              <div class="tree-child"><b>Child-02.md</b><span>${lang === "zh" ? "支付回调与并行风险" : "Payment callback and parallel risk"}</span><div class="tree-ac-list"><div class="tree-ac pass"><b>AC-03 PASS</b><span>${lang === "zh" ? "幂等测试已通过" : "Idempotency tests passed"}</span></div><div class="tree-ac"><b>Memory</b><span>${lang === "zh" ? "等待稳定事实回写" : "Stable facts pending"}</span></div></div></div>
            </div>
          </div>
        </div>`;
      }
      return `<div class="final-board tree-close">
        <div class="final-tree"><h3>Hybrid Tree</h3><div class="tree-root"><b>Parent.md</b><span>${lang === "zh" ? "Scope / DoD / Memory 全部关闭" : "Scope / DoD / Memory all closed"}</span></div><div class="final-pass-grid"><div class="final-pass"><b>Scope PASS</b><span>${lang === "zh" ? "边界锁定" : "boundaries locked"}</span></div><div class="final-pass"><b>AC-01 PASS</b><span>${lang === "zh" ? "路由恢复" : "route recovery"}</span></div><div class="final-pass"><b>AC-02 PASS</b><span>${lang === "zh" ? "Child 符合" : "child matched"}</span></div><div class="final-pass"><b>AC-03 PASS</b><span>${lang === "zh" ? "测试覆盖" : "tests covered"}</span></div><div class="final-pass"><b>Memory updated</b><span>${lang === "zh" ? "事实回写" : "facts persisted"}</span></div><div class="final-pass"><b>Closed</b><span>${lang === "zh" ? "流程关闭" : "flow closed"}</span></div></div></div>
        <div class="close-card"><b>${lang === "zh" ? "工作流结束条件" : "Workflow exit condition"}</b><span>${lang === "zh" ? "结束画面绑定文档树：只有 Hybrid Tree 中的 Scope、AC 与 Memory 全部通过，流程才关闭。" : "The ending is bound to the document tree: the workflow closes only after Scope, ACs, and Memory all pass in Hybrid Tree."}</span></div>
      </div>`;
    }

    function iterationLoop(progress, expo, clamp) {
      const p = clamp(progress);
      const on = (start) => expo(clamp((p - start) * 3.2)).toFixed(3);
      const flow = (start) => expo(clamp((p - start) * 4)).toFixed(3);
      const steps = lang === "zh"
        ? [
            ["coderX R1", "按 Child AC 生成第一版实现。", ["AC-01 touched", "AC-02 touched"]],
            ["evaluatorX", "独立验收，发现回滚测试和幂等缺口。", ["AC-01 PASS", "AC-02 FIX", "AC-03 FIX"]],
            ["coderX R2", "融合 razorX skill：删重复分支，收敛 guard。", ["razorX skill", "AC-02 repaired"]],
            ["evaluatorX R2", "复读 diff / code / tests，逐条核对 AC。", ["AC-01 PASS", "AC-02 PASS", "AC-03 PASS"]]
          ]
        : [
            ["coderX R1", "Builds the first implementation against Child AC.", ["AC-01 touched", "AC-02 touched"]],
            ["evaluatorX", "Finds rollback-test and idempotency gaps.", ["AC-01 PASS", "AC-02 FIX", "AC-03 FIX"]],
            ["coderX R2", "Uses razorX skill: remove duplicate branches, converge guard.", ["razorX skill", "AC-02 repaired"]],
            ["evaluatorX R2", "Re-reads diff, code, and tests against every AC.", ["AC-01 PASS", "AC-02 PASS", "AC-03 PASS"]]
          ];
      return `<div class="iteration-flow">
        ${steps.map((step, i) => {
          const active = p > i * 0.24 ? "active" : "";
          return `<div class="iter-step ${active}" style="--on:${on(i * 0.2)};--flow:${flow(i * 0.22)}">
            <b>${step[0]}</b><span>${step[1]}</span>
            <div class="iter-mini-list">${step[2].map((item) => {
              const cls = item.includes("PASS") ? "pass" : item.includes("FIX") || item.includes("razorX") || item.includes("repaired") ? "hot" : "";
              return `<i class="${cls}">${item}</i>`;
            }).join("")}</div>
          </div>`;
        }).join("")}
      </div>`;
    }

    function render(t) {
      if (scene === "architecture") architecture();
      else if (scene === "token") token();
      else if (scene === "capabilities") capabilities();
      else workflow(t);
    }

    if (fixedT !== null && Number.isFinite(fixedT)) {
      render(Math.max(0, Math.min(0.999, fixedT)));
    } else {
      let start = null;
      function tick(now) {
        if (start === null) start = now;
        render(((now - start) % 20000) / 20000);
        requestAnimationFrame(tick);
      }
      requestAnimationFrame(tick);
    }
  </script>
</body>
</html>
