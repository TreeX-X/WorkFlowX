<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WorkflowX README Visuals</title>
  <style>
    :root {
      --ink: #f6f2ec;
      --muted: #9d968f;
      --paper: #030303;
      --panel: #0a0908;
      --panel-2: #12100e;
      --line: #2a211b;
      --orange: #ff5a1f;
      --orange-2: #ff8a24;
      --orange-soft: rgba(255, 90, 31, 0.16);
      --charcoal: #181512;
      --green: #ff5a1f;
      --teal: #ff8a24;
      --blue: #4a4038;
      --rust: #ff5a1f;
      --gold: #ff9d3d;
      --red: #ff5a1f;
      --gray: #24211e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: #111;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      letter-spacing: 0;
    }

    #stage {
      width: 1200px;
      height: 675px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 90, 31, 0.055), transparent 34%),
        linear-gradient(90deg, rgba(255, 90, 31, 0.055), transparent 32%, transparent 68%, rgba(255, 90, 31, 0.035)),
        var(--paper);
    }

    .frame {
      position: absolute;
      inset: 0;
      padding: 34px 48px 32px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 28px;
      margin-bottom: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 13px;
      color: var(--ink);
      font-weight: 780;
      font-size: 20px;
      line-height: 1;
    }

    .brand img {
      width: 36px;
      height: 14px;
      object-fit: contain;
    }

    .kicker {
      font-size: 12px;
      color: rgba(255, 138, 36, 0.82);
      text-transform: uppercase;
      font-weight: 760;
      letter-spacing: 0.08em;
      margin-bottom: 9px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.08;
      letter-spacing: 0;
      max-width: 760px;
    }

    .sub {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
      max-width: 570px;
      margin-top: 10px;
    }

      .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      max-width: 300px;
    }

    .pill {
      border: 1px solid rgba(255, 90, 31, 0.22);
      background: rgba(255, 90, 31, 0.055);
      border-radius: 6px;
      padding: 6px 9px;
      font-size: 11px;
      font-weight: 760;
      color: var(--ink);
      white-space: nowrap;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
    }

    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .panel {
      background: rgba(12, 11, 10, 0.86);
      border: 1px solid rgba(255, 90, 31, 0.16);
      border-radius: 8px;
      box-shadow: none;
    }

    .node {
      position: relative;
      min-height: 96px;
      padding: 14px;
    }

    .node strong {
      display: block;
      font-size: 18px;
      line-height: 1.1;
      margin-bottom: 9px;
    }

    .node p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 22px;
      border-radius: 999px;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 800;
      color: white;
      margin-bottom: 10px;
      background: var(--green);
    }

    .tag.blue { background: #40362f; }
    .tag.teal { background: var(--orange-2); }
    .tag.rust { background: var(--rust); }
    .tag.gold { background: var(--gold); }
    .tag.red { background: var(--red); }

    .architecture {
      display: grid;
      grid-template-columns: 245px 1fr 292px;
      gap: 18px;
      align-items: stretch;
      height: 396px;
    }

    .stack {
      display: grid;
      gap: 12px;
      align-content: stretch;
    }

    .main-agent {
      padding: 16px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      border: 1px solid rgba(255, 90, 31, 0.44);
      background: rgba(14, 12, 10, 0.92);
    }

    .agent-title {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .agent-title strong {
      font-size: 26px;
      line-height: 1.05;
    }

    .mini-flow {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .mini {
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 10px;
      min-height: 82px;
    }

    .mini b {
      display: block;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .mini span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.28;
      display: block;
    }

    .data-strip {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    .data-cell {
      border-left: 3px solid var(--orange);
      background: rgba(255, 90, 31, 0.055);
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.35;
      min-height: 54px;
    }

    .data-cell b {
      display: block;
      font-size: 13px;
      margin-bottom: 3px;
    }

    .connector {
      position: absolute;
      height: 2px;
      background: var(--line);
      transform-origin: left center;
    }

    .token-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 20px;
      height: 396px;
    }

    .saving {
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
      background: rgba(14, 13, 12, 0.86);
      border: 1px solid rgba(255, 90, 31, 0.38);
    }

    .saving .big {
      font-size: 68px;
      line-height: 0.92;
      font-weight: 850;
      color: var(--rust);
      margin-bottom: 16px;
    }

    .saving p {
      margin: 0;
      color: var(--muted);
      line-height: 1.42;
      font-size: 15px;
    }

    .layers {
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      gap: 13px;
    }

    .layer {
      display: grid;
      grid-template-columns: 88px 1fr 150px;
      gap: 14px;
      align-items: center;
      padding: 15px;
    }

    .layer-code {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: white;
      font-size: 24px;
      font-weight: 850;
      background: var(--green);
    }

    .layer:nth-child(2) .layer-code { background: var(--teal); }
    .layer:nth-child(3) .layer-code { background: #55463c; }

    .layer h2 {
      margin: 0 0 7px;
      font-size: 20px;
      line-height: 1.1;
    }

    .layer p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .metric {
      border-left: 1px solid var(--line);
      padding-left: 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.35;
    }

    .metric b {
      display: block;
      color: var(--ink);
      font-size: 21px;
      margin-bottom: 5px;
    }

    .cap-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      height: 396px;
    }

    .mode-table {
      padding: 18px;
    }

    .mode-row {
      display: grid;
      grid-template-columns: 124px 1fr 72px;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid var(--line);
      align-items: center;
    }

    .mode-row:last-child { border-bottom: 0; }

    .mode-badge {
      height: 36px;
      border-radius: 7px;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 850;
      background: var(--green);
      font-size: 12px;
    }

    .mode-row:nth-child(2) .mode-badge { background: var(--teal); }
    .mode-row:nth-child(3) .mode-badge { background: #55463c; }
    .mode-row:nth-child(4) .mode-badge { background: var(--rust); }

    .mode-copy b {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .mode-copy span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.28;
    }

    .mode-mark {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      line-height: 1.25;
    }

    .cap-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .cap {
      padding: 14px;
      min-height: 116px;
      border-left: 3px solid var(--orange);
    }

    .cap:nth-child(2),
    .cap:nth-child(4),
    .cap:nth-child(6) { border-left-color: rgba(255, 138, 36, 0.75); }
    .cap:nth-child(3),
    .cap:nth-child(5) { border-left-color: rgba(255, 90, 31, 0.42); }

    .cap b {
      display: block;
      font-size: 15px;
      margin-bottom: 8px;
      line-height: 1.14;
    }

    .cap span {
      color: var(--muted);
      display: block;
      font-size: 12px;
      line-height: 1.32;
    }

    .workflow {
      height: 400px;
      position: relative;
    }

    .workflow-line {
      position: absolute;
      left: 33px;
      right: 33px;
      top: 172px;
      height: 6px;
      background: #28221e;
      border-radius: 999px;
      overflow: hidden;
    }

    .workflow-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--green), var(--teal), var(--blue), var(--rust));
      border-radius: 999px;
      transition: width 0.1s linear;
    }

    .steps {
      position: absolute;
      left: 16px;
      right: 16px;
      top: 106px;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
    }

    .step {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
      min-width: 0;
    }

    .dot {
      width: 34px;
      height: 34px;
      margin: 44px auto 10px;
      border-radius: 50%;
      border: 2px solid #cfc5b6;
      background: #11100f;
      color: var(--muted);
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 840;
    }

    .step.done .dot {
      background: var(--green);
      border-color: var(--green);
      color: white;
    }

    .step.active .dot {
      background: var(--rust);
      border-color: var(--rust);
      color: white;
      box-shadow: 0 0 0 8px rgba(180, 90, 49, 0.12);
    }

    .step b {
      display: block;
      font-size: 11px;
      color: var(--ink);
      margin-bottom: 4px;
      white-space: normal;
    }

    .active-card {
      position: absolute;
      left: 50%;
      bottom: 4px;
      transform: translateX(-50%);
      width: 720px;
      min-height: 116px;
      padding: 16px 18px;
      display: grid;
      grid-template-columns: 190px 1fr;
      gap: 18px;
      align-items: center;
      background: #11100f;
      border: 2px solid rgba(180, 90, 49, 0.4);
    }

    .active-card .stage-no {
      color: var(--rust);
      font-size: 13px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .active-card h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.08;
    }

    .active-card p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.4;
    }

    .workflow-side {
      position: absolute;
      top: 10px;
      width: 248px;
      min-height: 108px;
      padding: 14px;
    }

    .workflow-side.left { left: 18px; }
    .workflow-side.right { right: 18px; }

    .workflow-side b {
      display: block;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .workflow-side span {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
      display: block;
    }

    .loop-arrow {
      position: absolute;
      width: 142px;
      height: 58px;
      right: 247px;
      top: 226px;
      border: 2px solid var(--red);
      border-left: 0;
      border-radius: 0 36px 36px 0;
      opacity: 0;
    }

    .loop-arrow::after {
      content: "";
      position: absolute;
      left: -8px;
      bottom: -7px;
      width: 0;
      height: 0;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
      border-right: 10px solid var(--red);
    }

    .console {
      position: relative;
      height: 400px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(17, 16, 15, 0.96), rgba(5, 5, 5, 0.98));
      box-shadow: inset 0 0 0 1px rgba(255, 90, 31, 0.04);
      overflow: hidden;
    }

    .console::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255, 90, 31, 0.045), transparent);
      pointer-events: none;
    }

    .lane {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255, 90, 31, 0.86), transparent);
      transform-origin: left center;
      opacity: 0.75;
    }

    .lane.dim {
      background: linear-gradient(90deg, transparent, rgba(215, 210, 202, 0.28), transparent);
      opacity: 0.55;
    }

    .console-card {
      position: absolute;
      border: 1px solid rgba(255, 90, 31, 0.28);
      background: rgba(13, 12, 11, 0.88);
      border-radius: 8px;
      padding: 13px 14px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.34);
    }

    .console-card.active {
      border-color: rgba(255, 90, 31, 0.9);
      box-shadow: 0 0 0 1px rgba(255, 90, 31, 0.32), 0 0 34px rgba(255, 90, 31, 0.18);
    }

    .console-card b {
      display: block;
      font-size: 15px;
      margin-bottom: 7px;
      color: var(--ink);
      line-height: 1.1;
    }

    .console-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.3;
    }

    .core-orbit {
      position: absolute;
      left: 423px;
      top: 88px;
      width: 246px;
      height: 246px;
      border-radius: 50%;
      border: 1px solid rgba(255, 90, 31, 0.35);
      display: grid;
      place-items: center;
      background: radial-gradient(circle, rgba(255, 90, 31, 0.18), rgba(14, 13, 12, 0.88) 54%, rgba(0, 0, 0, 0.3));
    }

    .core-ring {
      position: absolute;
      inset: 20px;
      border-radius: 50%;
      border: 2px dashed rgba(255, 177, 86, 0.45);
    }

    .core-label {
      position: relative;
      width: 142px;
      height: 142px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      text-align: center;
      background: #050505;
      border: 2px solid rgba(255, 90, 31, 0.78);
      box-shadow: 0 0 42px rgba(255, 90, 31, 0.22);
      padding: 18px;
    }

    .core-label b {
      display: block;
      font-size: 24px;
      line-height: 1.02;
    }

    .core-label span {
      display: block;
      margin-top: 8px;
      font-size: 11px;
      line-height: 1.25;
      color: var(--muted);
    }

    .module-chip {
      position: absolute;
      height: 28px;
      border-radius: 999px;
      border: 1px solid rgba(255, 90, 31, 0.34);
      background: rgba(8, 8, 8, 0.86);
      color: var(--ink);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 11px;
      font-size: 11px;
      font-weight: 840;
    }

    .module-chip.active {
      background: var(--rust);
      border-color: var(--rust);
      color: #090909;
      box-shadow: 0 0 24px rgba(255, 90, 31, 0.38);
    }

    .packet {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--rust);
      box-shadow: 0 0 0 7px rgba(255, 90, 31, 0.16), 0 0 32px rgba(255, 90, 31, 0.62);
      z-index: 12;
    }

    .packet.secondary {
      width: 12px;
      height: 12px;
      background: var(--gold);
      opacity: 0.72;
      z-index: 11;
    }

    .doc-panel {
      position: absolute;
      left: 378px;
      bottom: 24px;
      width: 340px;
      height: 92px;
      border: 1px solid rgba(255, 90, 31, 0.32);
      background: rgba(12, 11, 10, 0.92);
      border-radius: 8px;
      padding: 13px 14px;
    }

    .doc-panel b {
      font-size: 14px;
      display: block;
      margin-bottom: 10px;
    }

    .doc-line {
      height: 7px;
      border-radius: 999px;
      background: rgba(255, 90, 31, 0.22);
      margin: 8px 0;
      overflow: hidden;
    }

    .doc-line i {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--rust), var(--gold));
      border-radius: 999px;
    }

    .status-strip {
      position: absolute;
      left: 34px;
      right: 34px;
      top: 20px;
      height: 34px;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 6px;
    }

    .status-step {
      border: 1px solid rgba(255, 90, 31, 0.18);
      background: rgba(255, 90, 31, 0.05);
      color: rgba(245, 240, 232, 0.52);
      border-radius: 5px;
      display: grid;
      place-items: center;
      font-size: 10px;
      font-weight: 820;
      white-space: nowrap;
      overflow: hidden;
    }

    .status-step.done {
      border-color: rgba(255, 90, 31, 0.7);
      color: var(--ink);
      background: rgba(255, 90, 31, 0.22);
    }

    .status-step.active {
      background: var(--rust);
      border-color: var(--rust);
      color: #050505;
    }

    .verdict {
      position: absolute;
      right: 34px;
      bottom: 28px;
      width: 184px;
      height: 88px;
      border-radius: 8px;
      border: 1px solid rgba(255, 90, 31, 0.38);
      background: rgba(13, 12, 11, 0.9);
      padding: 13px;
    }

    .verdict .label {
      color: var(--muted);
      font-size: 11px;
      font-weight: 820;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .verdict .value {
      color: var(--rust);
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .scene-caption {
      position: absolute;
      left: 34px;
      bottom: 28px;
      width: 280px;
      min-height: 88px;
      border-left: 4px solid var(--rust);
      padding: 4px 0 0 14px;
    }

    .scene-caption .stage-no {
      color: var(--gold);
      font-size: 12px;
      font-weight: 880;
      margin-bottom: 7px;
    }

    .scene-caption h2 {
      margin: 0 0 8px;
      font-size: 23px;
      line-height: 1.05;
    }

    .scene-caption p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .flow-stage {
      position: relative;
      height: 400px;
      border: 1px solid rgba(255, 90, 31, 0.22);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 90, 31, 0.055), transparent 38%),
        #020202;
      overflow: hidden;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.035);
    }

    .flow-stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), transparent 22%, rgba(0, 0, 0, 0.24));
      pointer-events: none;
    }

    .process-rail {
      position: absolute;
      left: 48px;
      right: 48px;
      top: 26px;
      height: 86px;
    }

    .rail-track {
      position: absolute;
      left: 44px;
      right: 44px;
      top: 38px;
      height: 3px;
      background: rgba(255, 90, 31, 0.2);
      overflow: hidden;
    }

    .rail-fill {
      height: 100%;
      width: var(--rail, 0%);
      background: linear-gradient(90deg, #ff5a1f, #ff8a24);
      box-shadow: 0 0 18px rgba(255, 90, 31, 0.48);
    }

    .rail-nodes {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 8px;
    }

    .rail-node {
      position: relative;
      text-align: center;
      color: rgba(245, 240, 232, 0.54);
      font-size: 10px;
      font-weight: 820;
      line-height: 1.15;
      padding-top: 55px;
      white-space: nowrap;
    }

    .rail-node::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 25px;
      width: 24px;
      height: 24px;
      transform: translateX(-50%);
      border-radius: 50%;
      border: 1px solid rgba(255, 90, 31, 0.55);
      background: #060606;
      box-shadow: inset 0 0 0 4px #060606;
    }

    .rail-node.done::before {
      background: #ff5a1f;
      box-shadow: 0 0 18px rgba(255, 90, 31, 0.55);
    }

    .rail-node.active {

            <div class="loop-card loop-main"><b>Main Agent</b><span>${lang === "zh" ? "只转发 Fix Payload，不重开规划。" : "Forwards Fix Payload only; no replanning."}</span></div>
            <div class="loop-card loop-code"><b>coderX</b><span>${lang === "zh" ? "只修失败 AC，进入第 2 轮。" : "Fixes failed AC only; starts round 2."}</span></div>
            ${loopLine(184, 54, 270, 122)}
            ${loopLine(370, 122, 458, 54)}
          </div>`;
        return `
          <div class="scene-grid-3">
            <div class="work-card"><strong>xstatus</strong><span>${lang === "zh" ? "生成状态报告" : "Generate status report"}</span></div>
            <div class="work-card"><strong>MCP Memory</strong><span>${lang === "zh" ? "回写稳定事实" : "Write stable facts"}</span></div>
            <div class="work-card"><strong>Hybrid Tree</strong><span>${lang === "zh" ? "关闭迭代" : "Close iteration"}</span></div>
          </div>
          <div class="command-line" style="margin-top:16px">Evaluation Result: PASS</div>`;
      })();

      root.innerHTML = `
        <section class="frame">
          ${header(C.workflowTitle, C.workflowSub)}
          <div class="workflow-v4" style="${boardStyle}">
            <aside class="phase-index">
              <div class="index-title">${lang === "zh" ? "阶段索引" : "Phase Index"}</div>
              <div class="index-list">
                ${C.steps.map((step, i) => `
                  <div class="index-row ${i < idx ? "done" : i === idx ? "active" : ""}">
                    <div class="index-num">${String(i + 1).padStart(2, "0")}</div>
                    <div class="index-copy"><b>${step[0]}</b><span>${step[1]}</span></div>
                  </div>
                `).join("")}
              </div>
            </aside>
            <main class="motion-board">
              <div class="board-head">
                <div>
                  <div class="board-kicker">${lang === "zh" ? "当前演示" : "Current Demo"} / ${String(idx + 1).padStart(2, "0")}</div>
                  <h2>${boardTitle}</h2>
                  <p>${boardDesc}</p>
                </div>
                <div class="board-badge">${status}</div>
              </div>
              <div class="scene-panel">
                ${activeView}
              </div>
            </main>
            <aside class="state-ledger">
              <div class="ledger-title">${lang === "zh" ? "状态账本" : "State Ledger"}</div>
              <div class="ledger-card"><div class="label">${lang === "zh" ? "状态" : "State"}</div><div class="value">${status}</div></div>
              <div class="ledger-card"><div class="label">${lang === "zh" ? "迭代" : "Iteration"}</div><div class="value">${round}</div></div>
              <div class="ledger-card"><div class="label">${lang === "zh" ? "事实源 / 上限" : "Source / Cap"}</div><div class="value">${sourceValue}</div><div style="margin-top:8px;color:var(--muted);font-size:11px;font-weight:800">-N 3</div></div>
            </aside>
          </div>
          <div class="watermark">Created by Huashu-Design</div>
        </section>`;
    }

    function render(t) {
      if (scene === "architecture") arch();
      else if (scene === "token") token();
      else if (scene === "capabilities") capabilities();
      else workflowV4(t);
      window.__ready = true;
    }

    if (fixedT !== null && Number.isFinite(fixedT)) {
      render(fixedT);
    } else {
      const start = performance.now();
      function tick(now) {
        const t = ((now - start) % 15000) / 15000;
        render(t);
        requestAnimationFrame(tick);
      }
      tick(start);
    }
  </script>
</body>
</html>
