<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkflowX L1 Caching</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif; background: #FAFAF8; color: #1A1A1A; width: 720px; padding: 48px 40px 40px; }
  .phase-label { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; letter-spacing: 0.1em; color: #9B9B9B; margin-bottom: 12px; }
  .phase-label .dot { width: 8px; height: 8px; border-radius: 50%; background: #C04A1A; }
  .phase-label .step-num { font-family: 'Georgia', serif; font-size: 15px; color: #C04A1A; }
  .section-title { font-family: 'Georgia', serif; font-size: 28px; font-weight: 400; color: #1A1A1A; letter-spacing: 0.04em; margin-bottom: 24px; }
  .doc-view { background: #FFFFFF; border: 1px solid #E8E6E1; border-radius: 6px; padding: 28px 24px; border-left: 4px solid #3B82F6; }
  .doc-view .doc-title { font-family: 'Georgia', serif; font-size: 20px; color: #1A1A1A; margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
  .doc-view .doc-title .badge { font-size: 14px; padding: 3px 10px; border-radius: 4px; background: #EFF6FF; color: #2563EB; letter-spacing: 0.04em; }
  .doc-view .doc-desc { font-size: 15px; color: #6B6B6B; line-height: 1.7; margin-bottom: 20px; }
  .zone-labels { display: flex; gap: 4px; margin-bottom: 6px; }
  .zone-label { flex: 1; text-align: center; font-size: 14px; color: #6B6B6B; font-weight: 500; }
  .zones { display: flex; gap: 4px; margin-bottom: 18px; }
  .zone { flex: 1; padding: 12px 8px; font-size: 14px; text-align: center; border-radius: 4px; color: #FFFFFF; font-weight: 500; }
  .zone.static { background: #3B82F6; }
  .zone.incr { background: #60A5FA; }
  .zone.dyn { background: #93C5FD; color: #1E40AF; }
  .effect { display: inline-block; font-size: 14px; padding: 7px 18px; border-radius: 4px; letter-spacing: 0.04em; font-weight: 500; background: #EFF6FF; color: #2563EB; }
  .footer { text-align: center; margin-top: 28px; font-size: 14px; color: #9B9B9B; letter-spacing: 0.06em; }
</style>
</head>
<body>
  <div class="phase-label"><div class="dot"></div><span class="step-num">03</span> Token 优化 · L1</div>
  <div class="section-title">Section-Level Caching</div>
  <div class="doc-view">
    <div class="doc-title">混合文档拓扑排序 <span class="badge">L1</span></div>
    <div class="doc-desc">严格分区：极少变动的静态区置于顶部，持续命中 LLM Prompt Cache。动态区置于底部，覆写时不会导致缓存失效。</div>
    <div class="zone-labels"><span class="zone-label">静态区</span><span class="zone-label">增量区</span><span class="zone-label">动态区</span></div>
    <div class="zones">
      <div class="zone static">需求 / 范围 / DoD</div>
      <div class="zone incr">验收标准 / 文件索引</div>
      <div class="zone dyn">评估报告</div>
    </div>
    <div class="effect">首次后节省 40-60% Token</div>
  </div>
  <div class="footer">WorkflowX · 每次 SubAgent 唤醒的输入 Token 压缩到最小</div>
</body>
</html>
