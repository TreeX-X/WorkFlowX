<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkflowX 独有能力 · 数据与质量</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
    background: #FAFAF8;
    color: #1A1A1A;
    width: 720px;
    padding: 16px 36px;
  }
  .container { width: 100%; }

  .header { text-align: center; margin-bottom: 12px; }
  .header h1 {
    font-family: 'Georgia', 'Source Serif Pro', 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
    color: #1A1A1A;
  }
  .header .subtitle {
    font-size: 15px;
    color: #9B9B9B;
    letter-spacing: 0.1em;
  }

  .capability-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .cap-card {
    background: #FFFFFF;
    border: 1px solid #E8E6E1;
    border-radius: 6px;
    padding: 14px 14px;
    position: relative;
    overflow: hidden;
  }
  .cap-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    border-radius: 6px 6px 0 0;
  }
  .cap-card.ht::before { background: #C04A1A; }
  .cap-card.ac::before { background: #EF4444; }
  .cap-card.pm::before { background: #8B5CF6; }

  .cap-card .icon-wrap {
    width: 40px;
    height: 40px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 6px;
    font-size: 17px;
    font-weight: 600;
    color: #FFFFFF;
  }
  .cap-card.ht .icon-wrap { background: #C04A1A; }
  .cap-card.ac .icon-wrap { background: #EF4444; }
  .cap-card.pm .icon-wrap { background: #8B5CF6; }

  .cap-card .title {
    font-family: 'Georgia', serif;
    font-size: 16px;
    color: #1A1A1A;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  .cap-card .desc {
    font-size: 14px;
    color: #6B6B6B;
    line-height: 1.5;
  }
  .cap-card .tag {
    display: inline-block;
    font-size: 14px;
    letter-spacing: 0.06em;
    padding: 4px 12px;
    margin-top: 10px;
    border-radius: 4px;
    background: #F5F4F0;
    color: #6B6B6B;
  }

  .footer {
    text-align: center;
    margin-top: 14px;
    font-size: 14px;
    color: #9B9B9B;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>独有能力 · 数据与质量</h1>
    <div class="subtitle">Hybrid Tree · AC 交叉验证 · Prompt 优化引擎</div>
  </div>

  <div class="capability-grid">
    <div class="cap-card ht">
      <div class="icon-wrap">HT</div>
      <div class="title">Hybrid Tree 需求追踪</div>
      <div class="desc">Parent + Child 的 MECE 结构。唯一将需求文档化、结构化、可追踪的框架，而非散落在对话中。</div>
      <div class="tag">数据结构</div>
    </div>
    <div class="cap-card ac">
      <div class="icon-wrap">AC</div>
      <div class="title">AC 交叉验证</div>
      <div class="desc">evaluatorX 不信任 coderX 的自我声明。独立读取代码、对照验收标准、输出结构化评估报告。</div>
      <div class="tag">质量控制</div>
    </div>
    <div class="cap-card pm">
      <div class="icon-wrap">PM</div>
      <div class="title">Prompt 优化引擎</div>
      <div class="desc">promptMasterX 在编码前检测 37 种反模式。根据目标模型自动匹配最优提示策略。</div>
      <div class="tag">输入质量</div>
    </div>
  </div>

  <div class="footer">WorkflowX &middot; 通过工程纪律实现结构性优势</div>
</div>
</body>
</html>
